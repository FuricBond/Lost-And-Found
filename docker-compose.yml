version: '3.8'

services:
  # Backend API (SQLite + Local Storage)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lostfound_api
    environment:
      DATABASE_PATH: /app/data/lostfound.db
      UPLOAD_DIR: /app/data/uploads
      JWT_SECRET_KEY: your-super-secret-key-change-in-production
      DEBUG: "true"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data          # Persist SQLite DB and uploads
      - model_cache:/root/.cache  # Cache ML models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  model_cache:
